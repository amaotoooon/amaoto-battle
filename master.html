<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>あまおと丸バトル / マスター画面</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/master.css" />
</head>
<body class="master-page">
  <div class="container">
<header class="page-header">
  <div class="header-title">
    <h1>あまおと丸バトル / マスター画面</h1>
    <p>進行用の管理画面です。対戦開始、ターン解決、状態確認をここで行います。</p>
  </div>
  <div class="header-actions">
    <button type="button" class="secondary" data-open-rules>ルール確認</button>
  </div>
</header>

<section class="panel">
  <div class="form-grid">
    <div>
      <label for="master-room-code">ルームコード</label>
      <input id="master-room-code" value="AMAOTO1" />
    </div>
    <div style="grid-column: span 2;">
      <label>操作</label>
      <div class="master-toolbar">
        <button type="button" id="create-room">ルーム作成 / 初期化</button>
        <button type="button" id="start-match">対戦開始</button>
        <button type="button" id="resolve-turn" class="attention">ターン実行</button>
        <button type="button" class="secondary" id="show-spectator-rules">観戦画面にルール表示</button>
        <button type="button" class="secondary" id="reset-match">リセット</button>
      </div>
    </div>
  </div>
  <div id="state-summary" class="master-top-summary"></div>
</section>

<section class="panel">
  <div class="section-title-row">
    <h2>プレイヤー状況</h2>
    <div class="section-sub">行動入力の有無を上部で確認できます</div>
  </div>
  <div id="player-columns" class="master-columns"></div>
</section>

<section class="panel">
  <h2>バトルログ</h2>
  <ol id="master-log" class="log-list"></ol>
</section>

  </div>
  <script src="data/data.js"></script>
  <script src="js/config.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/common.js"></script>
  <script src="js/battle-engine.js"></script>
  <script src="js/master.js"></script>
</body>
</html>
