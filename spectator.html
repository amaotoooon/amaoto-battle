<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>あまおと丸のリスナーバトル / 観戦画面</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/spectator.css" />
</head>
<body class="spectator-page">
  <div class="container spectator-container">
    <header class="page-header spectator-header-minimal">
      <div class="header-title">
        <h1>あまおと丸のリスナーバトル</h1>
      </div>
      <div class="header-actions spectator-header-actions">
        <input id="spectator-room-code" value="AMAOTO1" placeholder="ルームコードを入力" />
        <button type="button" class="secondary" data-open-rules>ルール</button>
      </div>
    </header>

    <section class="panel turn-summary-panel">
      <div id="phase-banner" class="phase-banner">対戦開始前</div>
      <div id="turn-events" class="turn-events"></div>
    </section>

    <section class="spectator-battle-grid panel">
      <div id="spectator-left"></div>
      <div id="spectator-right"></div>
    </section>

    <div id="spectator-rules" class="rules-overlay hidden"></div>
  </div>
  <script src="data/data.js"></script>
  <script src="js/config.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/common.js"></script>
  <script src="js/spectator.js"></script>
</body>
</html>
