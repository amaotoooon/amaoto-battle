<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>あまおと丸バトル / 観戦画面</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/spectator.css" />
</head>
<body class="spectator-page">
  <div class="container">
<header class="page-header">
  <div class="header-title">
    <h1>あまおと丸バトル / 観戦画面</h1>
    <p>OBSで映す用の画面です。左右の状況とログを見やすく表示します。</p>
  </div>
  <div class="header-actions">
    <input id="spectator-room-code" value="AMAOTO1" />
    <button type="button" class="secondary" data-open-rules>ルール</button>
  </div>
</header>

<section class="panel spectator-state-panel">
  <div id="spectator-state"></div>
</section>

<section class="spectator-layout roomy-layout">
  <div id="spectator-left"></div>
  <div id="center-stage" class="stage-shell center-stage"></div>
  <div id="spectator-right"></div>
</section>

<section class="log-shell panel spectator-log-shell">
  <h2>バトルログ</h2>
  <ol id="spectator-log" class="log-list"></ol>
</section>

<div id="spectator-rules" class="rules-overlay hidden"></div>
  </div>
  <script src="data/data.js"></script>
  <script src="js/config.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/common.js"></script>
  <script src="js/spectator.js"></script>
</body>
</html>
